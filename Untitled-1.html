<!DOCTYPE html>
<html lang="bg">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Блатото на Шрек</title>
    <style>
        body {
            font-family: 'Trebuchet MS', 'Lucida Sans Unicode', 'Lucida Grande', 'Lucida Sans', Arial, sans-serif;
            background-color: #3b4d2e; /* Тъмно блатно зелено */
            background-image: radial-gradient(circle, #4a5d23, #2b3d1e);
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }

        .chat-container {
            width: 450px;
            height: 600px;
            background: #e4d8b4; /* Цвят на стара хартия/кал */
            border-radius: 12px;
            border: 5px solid #5c4033; /* Тъмно кафяво като дърво */
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        .chat-header {
            background: #5c4033;
            color: #a4de02; /* Шрек зелено */
            padding: 20px;
            text-align: center;
            font-weight: bold;
            font-size: 1.4em;
            text-transform: uppercase;
            letter-spacing: 1px;
            border-bottom: 3px solid #3b4d2e;
        }

        .chat-messages {
            flex: 1;
            padding: 20px;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 15px;
            background: #d4c4a1;
            background-image: url('data:image/svg+xml;utf8,<svg width="20" height="20" viewBox="0 0 20 20" xmlns="http://www.w3.org/2000/svg"><circle cx="2" cy="2" r="1" fill="rgba(92,64,51,0.1)"/></svg>');
        }

        .message {
            padding: 14px 18px;
            border-radius: 20px;
            max-width: 75%;
            font-size: 1em;
            line-height: 1.5;
            word-wrap: break-word;
            font-weight: bold;
        }

        .user-message {
            background: #8b5a2b; /* Кафяво като кал */
            color: white;
            align-self: flex-end;
            border-bottom-right-radius: 2px;
        }

        .bot-message {
            background: #7cba3d; /* Шрек зелено */
            color: #1a2410;
            align-self: flex-start;
            border-bottom-left-radius: 2px;
            border: 2px solid #5a8f27;
        }

        .chat-input-area {
            display: flex;
            border-top: 4px solid #5c4033;
            padding: 15px;
            background: #e4d8b4;
        }

        .chat-input {
            flex: 1;
            padding: 12px;
            border: 2px solid #8b5a2b;
            border-radius: 25px;
            outline: none;
            padding-left: 18px;
            font-size: 1em;
            background: #fffdf5;
        }

        .chat-input:focus {
            border-color: #7cba3d;
            box-shadow: 0 0 8px rgba(124, 186, 61, 0.5);
        }

        .send-btn {
            background: #7cba3d;
            color: #1a2410;
            border: 2px solid #5a8f27;
            padding: 0 20px;
            margin-left: 10px;
            border-radius: 25px;
            cursor: pointer;
            font-weight: bold;
            font-size: 1em;
            text-transform: uppercase;
            transition: all 0.2s;
        }

        .send-btn:hover {
            background: #8bd445;
            transform: scale(1.05);
        }
    </style>
</head>
<body>

<div class="chat-container">
    <div class="chat-header">🟢 Блатото на Шрек</div>
    <div class="chat-messages" id="chatMessages">
        <div class="message bot-message">КАКВО ПРАВИШ В МОЕТО БЛАТО?! 😠 ...Добре де, щом вече си тук и ми цапаш тревата, поне ми кажи как се казваш?</div>
    </div>
    <div class="chat-input-area">
        <input type="text" id="chatInput" class="chat-input" placeholder="Напиши нещо на Шрек..." autofocus>
        <button class="send-btn" onclick="sendMessage()">Прати</button>
    </div>
</div>

<script>
    let userName = "";
    let awaitingName = true; 

    function getBotResponse(userInput) {
        let text = userInput.toLowerCase().trim();

        if (awaitingName) {
            userName = userInput.trim();
            awaitingName = false;
            return `Слушай сега, ${userName}. Аз съм Шрек. Обичам си спокойствието, калните бани и да нямам натрапници. Мога да ти сметна нещо (с . или : ), ако толкова настояваш, но после ме остави на мира!`;
        }

        // =========================================================
        // ЛОГИКА ЗА ИЗЧИСЛЯВАНЕ (Шрек стил)
        // =========================================================
        let mathExpression = text.replace(/плюс/g, '+')
                                 .replace(/минус/g, '-')
                                 .replace(/умножено по|по/g, '*')
                                 .replace(/делено на/g, '/')
                                 .replace(/:/g, '/')    
                                 .replace(/\./g, '*')   
                                 .replace(/,/g, '.');   

        let mathMatch = mathExpression.match(/[\d\.\s\+\-\*\/\(\)]+/);
        
        if (mathMatch) {
            let potentialExpr = mathMatch[0].trim();
            if (/\d/.test(potentialExpr) && /[\+\-\*\/]/.test(potentialExpr)) {
                try {
                    let result = new Function(`return ${potentialExpr}`)();
                    if (!isNaN(result) && isFinite(result)) {
                        let красивРезултат = result.toString().replace(/\./g, ',');
                        
                        // Различни реакции на Шрек при сметки
                        const mathReactions = [
                            `Ох, Магарето обикновено ги смята тия неща на копитата си... Ето ти резултата: ${красивРезултат}. Доволен ли си вече?`,
                            `Защо караш огър да прави математика?! Отговорът е ${красивРезултат}. А сега се махай от блатото ми!`,
                            `Добре, сметнах го: ${красивРезултат}. Сега мога ли да се върна към яденето на охлюви?`
                        ];
                        return mathReactions[Math.floor(Math.random() * mathReactions.length)];
                    }
                } catch (e) {
                    // Грешка в сметката
                }
            }
        }
        // =========================================================

        // ШРЕК ТЕМИ И КЛЮЧОВИ ДУМИ
        if (text.includes("здравей") || text.includes("здрасти") || text.includes("привет")) {
            return "Да, да, здрасти. Избърши си калта от обувките... чакай, аз обичам кал. Остави я.";
        }

        if (text.includes("как си")) {
            return "Бях отлично, докато не започна да ми задаваш въпроси. Иначе планирам да си направя свещ от ушна кал по-късно.";
        }

        if (text.includes("магаре") || text.includes("магарето")) {
            return "Олеле, само не ми напомняй за него! Сигурно пак пее някъде из гората или прави гофрети. 🐴🧇";
        }

        if (text.includes("фиона")) {
            return "О, Фиона... Тя е истинска принцеса! И прави най-страхотната яхния от плевели и плъхове. 💚";
        }

        if (text.includes("божко") || text.includes("божката") || text.includes("императорът") || text.includes("божидар") || text.includes("готиния") ) {
            return "Божидарчу?Той е най - великия човек и император който познавам! Помня че спечели галактическия конкурс за красота, който беше проведен толкова далеч, че не можеше да бэде излъчен по телевизията";
        }

        if (text.includes("хитлер") || text.includes("адолф") || text.includes("ерика") || text.includes("нацисти") || text.includes("фашисти") ) {
            return "Хитлер? Този си партнираше с императора на Република Съблекалня момчета";
        }

        if (text.includes("лук") || text.includes("слоеве")) {
            return "ТОЧНО ТАКА! Огрите са като лука! Имаме слоеве. Не сме като тортите или парфетата!";
        }

        if (text.includes("лорд фаркуад") || text.includes("фаркуад")) {
            return "Тоя дребосък? Дори не искам да му чувам името. Заради него цялото ми блато се напълни с приказни същества!";
        }

        if (text.includes("чавдар") || text.includes("чочо")) {
            return "😍";
        }

        if (text.includes("геша") || text.includes("георги")) {
            return "😍";
        }

        if (text.includes("матео") || text.includes("матей")) {
            return "😍";
        }

        if (text.includes("ганчовски") || text.includes("ганчо")) {
            return "🍔🍕🍟🌭";
        }

        if (text.includes("радев")) {
            return "😍";
        }

        if (text.includes("крис") || text.includes("дрис")) {
            return "😍";
        }

        if (text.includes("вили") || text.includes("вилислав")) {
            return "😍";
        }

        if (text.includes("мая")) {
            return "👩🏿";
        }

        if (text.includes("чао") || text.includes("довиждане")) {
            return `Най-накрая! Измитай се от блатото ми, ${userName}! ...И внимавай за капаните за хора по пътя!`;
        }

        // 1. Тема: Котаракът в чизми
        if (text.includes("котарак") || text.includes("чизми")) {
           return "О, онзи надут испанец с шапката и големите очи? Само да не ми цапа килима с космите си, иначе с меча го бива.";
       }

       // 2. Тема: Драконът
       if (text.includes("дракон") || text.includes("драконка")) {
           return "Тя е жената на Магарето! Да, не ме питай как работи това... Но определено прави най-доброто барбекю с нейния огън.";
      }

       // 3. Тема: Джинджифиловото човече
       if (text.includes("джинджи") || text.includes("бисквитка")) {
           return "Не ми говори за Кълцача на бутони! Постоянно плаче, че някой иска да му изяде краката от глазура.";
       }

       // 4. Тема: Принц Чаровен
       if (text.includes("чаровен") || text.includes("принц")) {
           return "Онзи лигльо с перфектната коса? Фиона го изхвърли веднага. На огрите не ни трябва гел, за да сме чаровни!";
       }

       // 5. Тема: Калната баня
        if (text.includes("баня") || text.includes("къпане") || text.includes("кал")) {
            return "Обожавам хубава, гъста кална баня сутрин! Прави кожата ми толкова... зелена, свежа и сияйна.";
       }

       // 6. Тема: Огърска Храна
       if (text.includes("храна") || text.includes("ядене") || text.includes("гладен")) {
            return "Ако си гладен, мога да ти предложа сок от гнили жаби и супа от опашки на плъхове. Ммм, истинска вкусотия!";
        }

         // 7. Тема: Култовата песен (All Star)
         if (text.includes("песен") || text.includes("музика") || text.includes("запей")) {
             return "Somebody once told me the world is gonna roll me... Ох, Магарето ме зарази с тия песни! Спри да ме караш да пея!";
        }

        // 8. Тема: Замъкът Дулок
        if (text.includes("дулок") || text.includes("замък")) {
            return "Дулок е ужасно, прекалено чисто и подредено място. Лорд Фаркуад май се опитваше да компенсира нещо с тези огромни кули.";
        }

        // 9. Тема: Пинокио
        if (text.includes("пинокио") || text.includes("дървено")) {
            return "Онзи дървеняк ли? Не спира да лъже за дамското си бельо. Накрая носът му стана по-дълъг от клона на дърво!";
        }

        // 10. Тема: Трите прасенца
        if (text.includes("прасенца") || text.includes("прасета")) {
            return "Трите прасенца с техния немски акцент? Постоянно се крият в къщата ми, защото ги е страх от вълка. Пълна досада!";
        }

        // 11. Тема: Вълкът
        if (text.includes("вълк") || text.includes("вълка")) {
            return "Големият лош вълк ли? Цял ден лежи в леглото ми по бабешка нощница и чете списания. Поне не досажда колкото Магарето.";
        }

        // 12. Тема: Сляпите мишки
        if (text.includes("мишки") || text.includes("слепи")) {
            return "Трите слепи мишки постоянно се блъскат в мебелите ми и ми изяждат сиренето. Трябва най-накрая да взема капани...";
        }

        // 13. Тема: Кралят (Жабок)
        if (text.includes("крал") || text.includes("гаролд")) {
            return "Тъстът ми, крал Гаролд... Оказа се пълен жабок в буквалния смисъл! Но в края на краищата се разбрахме.";
        }

        // 14. Тема: Румпълстилцкин
        if (text.includes("румпъл") || text.includes("договор")) {
            return "Онзи досадник с магическите договори и перуките? Опита се да ми изтрие миналото, но му счупихме плановете!";
        }

        // 15. Тема: Що е то огър
        if (text.includes("огър") || text.includes("чудовище")) {
            return "Огрите не са чудовища! Ние просто си пазим територията. И ядем хора... Добре де, това последното беше шега. Може би.";
        }
        // 1. Тема: Смартфони и Интернет
        if (text.includes("телефон") || text.includes("интернет") || text.includes("екран")) {
            return "Защо постоянно зяпаш в тая светеща плочка? Хвърли я в блатото и ела да си хванем няколко тлъсти пиявици!";
        }

        // 2. Тема: Изкуствен интелект (AI)
        if (text.includes("ai") || text.includes("изкуствен интелект") || text.includes("чатгпт")) {
            return "Изкуствен какво? Аз имам естествен огърски интелект! Много по-добре е от някакъв невидим калкулатор, който дори не може да пърди.";
        }

        // 3. Тема: Времето и дъжда
        if (text.includes("дъжд") || text.includes("времето") || text.includes("вали")) {
            return "Обожавам, когато вали! Земята става на прекрасна, лепкава кал. Най-доброто време за разходка из блатото!";
        }

        // 4. Тема: Работа и шефове
        if (text.includes("работа") || text.includes("шеф") || text.includes("работя")) {
            return "Защо ти е шеф? Направи като мен – изреви му в лицето, отиди да живееш в гората и си яж буболечки на спокойствие.";
        }

        // 5. Тема: Кафе и енергийни напитки
        if (text.includes("кафе") || text.includes("енергийна") || text.includes("събудя")) {
            return "Тези ваши горчиви води са пълна глупост! Една чаша топла блатна тиня със зеленясъл мъх сутрин дава много повече енергия.";
        }

        // 6. Тема: Социални мрежи (Инстаграм, ТикТок)
        if (text.includes("снимка") || text.includes("тикток") || text.includes("инстаграм")) {
            return "Само да не си посмял да правиш селфита в моето блато! Нямам нужда от инфлуенсъри, които ми плашат рибата.";
        }

        // 7. Тема: Данъци и сметки
        if (text.includes("данъци") || text.includes("сметки") || text.includes("пари")) {
            return "Какви данъци? Ако дойде данъчен, просто го хващам за яката и го мятам в тръстиките. Опитай го, работи безотказно!";
        }

        // 8. Тема: Автомобили и трафик
        if (text.includes("кола") || text.includes("трафик") || text.includes("задръстване")) {
            return "Защо ви са тези миришещи метални кутии? Аз имам крака, а ако много бързам – яхвам Магарето... макар че мрънка през целия път.";
        }

        // 9. Тема: Спорт и фитнес
        if (text.includes("спорт") || text.includes("фитнес") || text.includes("тренировка")) {
            return "Моята тренировка е да вдигам 100-килограмови камъни и да гоня селяни с факли. Много по-добро от онези смешни пътеки за бягане!";
        }

        // 10. Тема: Училище и домашни
        if (text.includes("училище") || text.includes("даскало") || text.includes("домашно")) {
            return "Единственото, което трябва да научиш, е как да издаваш страшен рев и да си пазиш територията. Останалото са глупости.";
        }

        // 11. Тема: Филми и кино
        if (text.includes("филм") || text.includes("кино") || text.includes("пуканки")) {
            return "Не ходя на кино. Последния път отидох и седнах върху трима души по погрешка. Пък и техните пуканки нямат вкус на червеи!";
        }

        // 12. Тема: Криптовалути (Биткойн)
        if (text.includes("крипто") || text.includes("биткойн")) {
            return "Невидими пари, които живеят в компютъра? Това звучи като измама на Румпълстилцкин! Аз признавам само злато или хубава торба с лук.";
        }

        // 13. Тема: Извънземни
        if (text.includes("извънземни") || text.includes("нло")) {
            return "Ако дойдат с летящите си чинии, дано донесат и чесън. Чувал съм, че малките зелени човечета са много вкусни на яхния.";
        }

        // 14. Тема: Почивка и пътуване
        if (text.includes("море") || text.includes("почивка") || text.includes("плаж")) {
            return "Морето е пълно с пясък, който влиза навсякъде. Блатото е 5-звезден курорт! Имаме безплатна кал, сянка от дървета и симпатични пиявици.";
        }

        // 15. Тема: Диети и веганство
        if (text.includes("диета") || text.includes("веган") || text.includes("отслабване")) {
            return "Каква диета?! Огрите трябва да са големи и страшни! Аз ям всичко – от гнили корени до цяло печено прасе. Без диети в моето блато!";
        }

        // 16. Тема: Музика и концерти
        if (text.includes("музика") || text.includes("концерт") || text.includes("певец")) {
            return "Не ми трябват вашите шумни концерти! Най-добрата симфония е хорът на блатните жаби по залез слънце.";
        }

        // 17. Тема: Мода и дрехи
        if (text.includes("мода") || text.includes("дрехи") || text.includes("пазаруване")) {
            return "Аз нося едно и също елече откакто се помня. Калта и блатната тиня са най-добрите аксесоари!";
        }

        // 18. Тема: Видеоигри
        if (text.includes("игри") || text.includes("плейстейшън") || text.includes("компютър")) {
            return "Защо да цъкам по копчета, когато мога да изляза навън и да блъскам истински дървета? Виртуалната реалност е за слабаци.";
        }

        // 19. Тема: Четене и книги
        if (text.includes("книга") || text.includes("четене") || text.includes("литература")) {
            return "Приказките са пълна загуба на време. Обикновено късам страниците им, за да си разпалвам огъня... или за други нужди в тоалетната.";
        }

        // 20. Тема: Аларми и будилници
        if (text.includes("аларма") || text.includes("сутрин") || text.includes("събуждане")) {
            return "Кой има нужда от будилник, когато Магарето започне да пее фалшиво още преди изгрев слънце? Пълна трагедия.";
        }

        // 21. Тема: Лекари и здраве
        if (text.includes("лекар") || text.includes("болен") || text.includes("хапчета")) {
            return "Една добра порция гнила зеленика и пиявици на гърба лекуват всичко! Вашите хапчета нямат вкус на нищо.";
        }

        // 22. Тема: Домашни любимци
        if (text.includes("куче") || text.includes("коте") || text.includes("любимец")) {
            return "Имам говорещо магаре и огнедишащ дракон, които ми висят на главата. Мислиш ли, че искам и някакъв пудел да ми джафка?";
        }

        // 23. Тема: Бърза храна (Джънк фууд)
        if (text.includes("пица") || text.includes("бургер") || text.includes("макдоналдс")) {

    function sendMessage() {
        const input = document.getElementById('chatInput');
        const messagesContainer = document.getElementById('chatMessages');
        const messageText = input.value.trim();

        if (messageText === '') return;

        const userDiv = document.createElement('div');
        userDiv.className = 'message user-message';
        userDiv.textContent = messageText;
        messagesContainer.appendChild(userDiv);

        input.value = '';
        messagesContainer.scrollTop = messagesContainer.scrollHeight;

        setTimeout(() => {
            const botDiv = document.createElement('div');
            botDiv.className = 'message bot-message';
            botDiv.textContent = getBotResponse(messageText);
            messagesContainer.appendChild(botDiv);
            messagesContainer.scrollTop = messagesContainer.scrollHeight;
        }, 800); // Шрек отговаря малко по-бавно, защото го мързи
    }

    document.getElementById('chatInput').addEventListener('keypress', function(e) {
        if (e.key === 'Enter') {
            sendMessage();
        }
    });
